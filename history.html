<!DOCTYPE html>
<html lang="th">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ข้อมูลย้อนหลัง</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
background:#f0f4f8;
font-family:'Kanit',sans-serif;
}

.history-card{
background:white;
border-radius:20px;
padding:16px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.04);
}

.status-danger{
color:#ef4444;
font-weight:700;
}

.status-warning{
color:#f59e0b;
font-weight:700;
}

.status-normal{
color:#22c55e;
font-weight:700;
}

.nav-bottom{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:500px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-top:1px solid #eee;
padding:10px 0;
display:flex;
justify-content:space-around;
}

.nav-item{
text-align:center;
color:#94a3b8;
font-size:0.7rem;
text-decoration:none;
}

.nav-item.active{
color:#0d6efd;
}

/* custom segmented control styles */
.segmented-control {
    display: inline-flex;
    background: #e5e7eb;
    border-radius: 1.5rem;
    padding: 3px;
    margin: 0 auto; /* center horizontally */
}

/* ensure parent centers inline-flex element */
.container.py-3 {
    text-align: center;
}

.seg-btn {
    flex: 1;
    padding: 0.5rem 0.75rem;
    font-family: 'Kanit', sans-serif;
    font-size: 0.9rem;
    color: #6b7280;
    background: transparent;
    border: none;
    border-radius: 1.25rem;
    cursor: pointer;
}

.seg-btn.active {
    background: #fff;
    color: #0d6efd;
    font-weight: 700;
}

</style>
</head>

<body class="pb-5">

<div class="container py-3" style="max-width:500px">

<h4 class="text-center fw-bold mb-3">
ข้อมูลน้ำย้อนหลัง
</h4>

<!-- custom segmented control -->
<div class="segmented-control mb-4" id="filter-buttons">
    <button class="seg-btn active" data-days="7">7 วัน</button>
    <button class="seg-btn" data-days="30">30 วัน</button>
    <button class="seg-btn" data-days="90">90 วัน</button>
</div>

<div id="history-list"></div>

</div>

<div class="nav-bottom">
    <a href="home.html" class="nav-item">
        <i class="fas fa-home fs-4 d-block mb-1"></i>
        <span>หน้าหลัก</span>
    </a>
    <a href="history.html" class="nav-item active">
        <i class="fas fa-chart-bar fs-4 d-block mb-1"></i>
        <span>ข้อมูลย้อนหลัง</span>
    </a>
</div>

<script src="history.js"></script>

</body>
</html>
