<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กล้อง CCTV - แผงควบคุมเจ้าหน้าที่</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #0d6efd;
            --bg: #f0f4f8;
        }

        body {
            background-color: var(--bg);
            font-family: 'Kanit', 'Segoe UI', Tahoma, sans-serif;
            color: #334155;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0 0.5rem 1.25rem;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #0d6efd);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
        }

        .side-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0.85rem;
            border-radius: 0.85rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 0.25rem;
            transition: all 0.15s;
        }

        .side-link i {
            width: 20px;
            text-align: center;
        }

        .side-link:hover {
            background: #f1f5f9;
            color: #334155;
        }

        .side-link.active {
            background: var(--brand);
            color: #fff;
            box-shadow: 0 8px 18px rgba(13, 110, 253, 0.3);
        }

        .complaint-btn {
            margin-top: auto;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            border: none;
            border-radius: 1.5rem;
            padding: 0.85rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
        }

        /* ===== Main ===== */
        .main {
            margin-left: 250px;
            padding: 1.5rem 2rem;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .search-box {
            flex: 1;
            max-width: 420px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            border: none;
            background: #fff;
            border-radius: 2rem;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #fff;
            border: none;
            color: #64748b;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #fff;
            border-radius: 2rem;
            padding: 0.3rem 0.9rem 0.3rem 0.3rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }

        .profile .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #0d6efd);
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
        }

        .glass-card {
            background: #fff;
            border-radius: 1.75rem;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        /* ===== CCTV ===== */
        .cctv {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            height: 250px;
        }

        .cctv img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(220, 38, 38, 0.9);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
            z-index: 2;
        }

        .live-badge .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #fff;
            border-radius: 50%;
            margin-right: 4px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.2; }
        }

        .cctv-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            display: grid;
            place-items: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            z-index: 2;
        }

        .cctv-btn:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.1);
        }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); transition: transform .2s; z-index: 1050; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .menu-toggle { display: inline-flex !important; }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-water"></i></div>
            <div>
                <div class="fw-bold" style="font-size:0.95rem;line-height:1.1">ระบบเฝ้าระวังระดับน้ำ</div>
                <small class="text-muted">ตำบลแม่แรม</small>
            </div>
        </div>

        <nav>
            <a href="staff.html" class="side-link"><i class="fas fa-table-columns"></i> แผงหลัก</a>
            <a href="staff-cctv.html" class="side-link active"><i class="fas fa-video"></i> กล้อง CCTV</a>
            <a href="staff-history.html" class="side-link"><i class="fas fa-clock-rotate-left"></i> รายงานย้อนหลัง</a>
            <a href="staff-settings.html" class="side-link"><i class="fas fa-gear"></i> ตั้งค่าระบบ</a>
        </nav>

        <button class="complaint-btn"><i class="fas fa-paper-plane me-1"></i> ส่งเรื่องร้องเรียน</button>
    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Topbar -->
        <div class="topbar">
            <button class="icon-btn menu-toggle d-none" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="ค้นหากล้อง...">
            </div>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="icon-btn position-relative">
                    <i class="fas fa-bell"></i>
                    <span class="position-absolute top-0 end-0 bg-danger rounded-circle" style="width:9px;height:9px"></span>
                </button>
                <button class="icon-btn"><i class="fas fa-gear"></i></button>
                <div class="profile">
                    <div class="avatar">จ</div>
                    <div class="small fw-bold d-none d-md-block">เจ้าหน้าที่</div>
                </div>
            </div>
        </div>

        <!-- Page header -->
        <div class="d-flex justify-content-between align-items-end flex-wrap mb-4">
            <div>
                <small class="text-muted">ระบบกล้อง</small>
                <h2 class="fw-bold mb-0">กล้อง CCTV เรียลไทม์</h2>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary rounded-pill btn-sm"><i class="fas fa-border-all me-1"></i> มุมมองกริด</button>
            </div>
        </div>

        <div class="row g-4">
            <!-- Camera 1 -->
            <div class="col-md-6 col-lg-6">
                <div class="card glass-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="fw-bold"><i class="fas fa-video text-primary me-2"></i>สะพานหมู่ 2</div>
                        <span class="badge bg-success rounded-pill"><span class="spinner-grow spinner-grow-sm me-1" style="width: 10px; height: 10px;" role="status" aria-hidden="true"></span> ออนไลน์</span>
                    </div>
                    <div class="cctv">
                        <img src="https://images.unsplash.com/photo-1467890947394-8171244e5410?auto=format&fit=crop&w=800&q=80" alt="กล้อง CCTV 1">
                        <span class="live-badge"><span class="dot"></span>LIVE-REC</span>
                        <button class="cctv-btn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
            <!-- Camera 2 -->
            <div class="col-md-6 col-lg-6">
                <div class="card glass-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="fw-bold"><i class="fas fa-video text-primary me-2"></i>ฝายน้ำล้น</div>
                        <span class="badge bg-success rounded-pill"><span class="spinner-grow spinner-grow-sm me-1" style="width: 10px; height: 10px;" role="status" aria-hidden="true"></span> ออนไลน์</span>
                    </div>
                    <div class="cctv">
                        <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=800&q=80" alt="กล้อง CCTV 2">
                        <span class="live-badge"><span class="dot"></span>LIVE-REC</span>
                        <button class="cctv-btn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
            <!-- Camera 3 -->
            <div class="col-md-6 col-lg-6">
                <div class="card glass-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="fw-bold"><i class="fas fa-video text-primary me-2"></i>ปลายน้ำหมู่ 4</div>
                        <span class="badge bg-success rounded-pill"><span class="spinner-grow spinner-grow-sm me-1" style="width: 10px; height: 10px;" role="status" aria-hidden="true"></span> ออนไลน์</span>
                    </div>
                    <div class="cctv">
                        <img src="https://images.unsplash.com/photo-1437622368342-7a3d73a34c8f?auto=format&fit=crop&w=800&q=80" alt="กล้อง CCTV 3">
                        <span class="live-badge"><span class="dot"></span>LIVE-REC</span>
                        <button class="cctv-btn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
            <!-- Camera 4 -->
            <div class="col-md-6 col-lg-6">
                <div class="card glass-card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="fw-bold"><i class="fas fa-video text-secondary me-2"></i>อ่างเก็บน้ำ</div>
                        <span class="badge bg-secondary rounded-pill">ออฟไลน์</span>
                    </div>
                    <div class="cctv d-flex align-items-center justify-content-center bg-dark">
                        <div class="text-white text-center">
                            <i class="fas fa-video-slash fa-3x mb-2 text-secondary"></i>
                            <p class="mb-0 text-muted">ขาดการเชื่อมต่อสัญญาณ</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mobile sidebar toggle
        const menuToggle = document.getElementById('menuToggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
        }
    </script>
</body>
</html>
